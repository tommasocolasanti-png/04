<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progetto — Tommaso Colasanti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#0C0C0C;--dark2:#141414;--dark3:#1C1C1C;
  --light:#F4F1EC;--light2:#EAE6DF;--white:#FFFFFF;--ink:#181818;
  --warm:#E5591E;--cold:#3A6E96;
  --muted-d:rgba(255,255,255,.36);--muted-l:#7A7265;
  --border-d:rgba(255,255,255,.09);--border-l:rgba(0,0,0,.09);
  --font-head:'Bebas Neue',Impact,sans-serif;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',Arial,sans-serif;
}
html{scroll-behavior:smooth;cursor:none;}
body{background:var(--dark);color:var(--white);font-family:var(--font-body);font-size:15px;line-height:1.7;overflow-x:hidden;}
#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--warm);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .18s,height .18s;}
#cur-ring{position:fixed;width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(229,89,30,.45);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}
.ch #cur{width:52px;height:52px;background:rgba(229,89,30,.15);}
.ch #cur-ring{border-color:var(--warm);width:52px;height:52px;}

nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:20px 56px;border-bottom:1px solid transparent;transition:padding .4s,background .4s,border-color .4s;}
nav.scrolled{padding:14px 56px;background:rgba(12,12,12,.9);backdrop-filter:blur(20px);border-color:var(--border-d);}
.nav-logo{font-family:var(--font-head);font-size:22px;letter-spacing:.06em;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:8px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--warm);animation:dotpulse 2.5s ease-in-out infinite;}
@keyframes dotpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.7);background:var(--cold);}}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{font-family:var(--font-body);font-size:11px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-d);text-decoration:none;transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--warm);transition:width .3s;}
.nav-links a:hover{color:var(--white);}
.nav-links a:hover::after{width:100%;}
.nav-cta{font-family:var(--font-body);font-size:10px;font-weight:300;letter-spacing:.16em;text-transform:uppercase;border:1px solid rgba(255,255,255,.2);border-radius:100px;padding:9px 22px;color:var(--white);text-decoration:none;transition:all .25s;}
.nav-cta:hover{background:var(--warm);border-color:var(--warm);}

/* HERO FULL */
#proj-hero{height:70vh;min-height:500px;position:relative;overflow:hidden;}
#proj-hero-img{width:100%;height:100%;object-fit:cover;filter:saturate(.7);transition:transform 8s ease-out;}
#proj-hero:hover #proj-hero-img{transform:scale(1.04);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,12,12,.95) 0%,rgba(12,12,12,.3) 50%,transparent 100%);}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:56px 56px 52px;}
.hc-top{display:flex;align-items:center;gap:20px;margin-bottom:16px;}
.hc-cat{font-family:var(--font-body);font-size:10px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;color:var(--warm);}
.hc-sep{width:20px;height:1px;background:rgba(255,255,255,.3);}
.hc-num{font-family:var(--font-body);font-size:10px;font-weight:300;letter-spacing:.2em;color:var(--muted-d);}
#proj-title{font-family:var(--font-head);font-size:clamp(52px,7vw,96px);line-height:.88;letter-spacing:.04em;opacity:0;animation:fadeUp .9s .3s forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* NAV ROW */
.proj-nav-row{display:flex;justify-content:space-between;align-items:center;padding:20px 56px;border-bottom:1px solid var(--border-d);background:var(--dark2);}
.back-btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-body);font-size:10px;font-weight:300;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-d);text-decoration:none;transition:color .2s;}
.back-btn:hover{color:var(--white);}
.back-btn::before{content:'←';font-size:14px;}
.proj-nav-btns{display:flex;gap:14px;}
.pnb{font-family:var(--font-body);font-size:10px;font-weight:300;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-d);background:none;border:1px solid var(--border-d);border-radius:100px;padding:8px 18px;cursor:pointer;transition:all .2s;}
.pnb:hover{color:var(--white);border-color:rgba(255,255,255,.25);}

/* CONTENT */
#proj-content{padding:80px 56px;display:grid;grid-template-columns:7fr 5fr;gap:90px;align-items:start;}
.pc-desc h3{font-family:var(--font-head);font-size:32px;letter-spacing:.06em;color:var(--white);margin-bottom:18px;}
.pc-desc p{font-size:15px;font-weight:300;color:var(--muted-d);line-height:1.85;margin-bottom:18px;}
.pc-desc p em{font-style:italic;color:rgba(255,255,255,.6);}

/* gallery */
.gallery{display:grid;gap:10px;margin-top:40px;}
.gallery-row2{grid-template-columns:1fr 1fr;}
.gallery img{width:100%;border-radius:4px;display:block;filter:saturate(.75);transition:filter .4s;aspect-ratio: 3 / 2;
    object-fit: cover;}
.gallery img:hover{filter:saturate(1);}

/* meta */
.pc-meta{position:sticky;top:100px;}
.meta-box{border:1px solid var(--border-d);border-radius:4px;overflow:hidden;margin-bottom:20px;}
.meta-row{display:flex;flex-direction:column;padding:16px 18px;border-bottom:1px solid var(--border-d);background:var(--dark2);}
.meta-row:last-child{border-bottom:none;}
.meta-row label{font-family:var(--font-body);font-size:9px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:var(--warm);margin-bottom:5px;}
.meta-row span{font-family:var(--font-head);font-size:16px;letter-spacing:.04em;color:var(--white);}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.tag{font-family:var(--font-body);font-size:9px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border:1px solid var(--border-d);border-radius:100px;color:var(--muted-d);}

/* OTHER PROJECTS */
#other-projects{padding:80px 56px 100px;border-top:1px solid var(--border-d);}
.op-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px;}
.op-h3{font-family:var(--font-head);font-size:clamp(32px,4vw,52px);letter-spacing:.04em;}
.op-h3 em{font-family:'Playfair Display',serif;font-style:italic;font-size:.7em;letter-spacing:0;color:var(--warm);}
.op-link{font-family:var(--font-body);font-size:10px;font-weight:300;letter-spacing:.16em;text-transform:uppercase;color:var(--warm);text-decoration:none;display:flex;align-items:center;gap:8px;transition:opacity .2s;}
.op-link:hover{opacity:.7;}

/* horizontal scroll strip for other projects */
.other-strip{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;}
.other-strip::-webkit-scrollbar{display:none;}
.op-card{flex-shrink:0;width:280px;border-radius:4px;overflow:hidden;border:1px solid var(--border-d);cursor:pointer;scroll-snap-align:start;transition:transform .38s cubic-bezier(.25,.46,.45,.94);}
.op-card:hover{transform:translateY(-6px);}
.op-card img{width:100%;height:180px;object-fit:cover;display:block;filter:saturate(.55);transition:filter .4s,transform .6s;}
.op-card:hover img{filter:saturate(1);transform:scale(1.05);}
.op-card-body{padding:14px 16px;background:var(--dark2);}
.op-card-cat{font-family:var(--font-body);font-size:9px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:var(--warm);margin-bottom:4px;}
.op-card-title{font-family:var(--font-head);font-size:18px;letter-spacing:.04em;color:var(--white);}

footer{background:var(--dark);border-top:1px solid var(--border-d);padding:28px 56px;display:flex;justify-content:space-between;align-items:center;}
.ft-l{font-family:var(--font-head);font-size:14px;letter-spacing:.06em;color:rgba(255,255,255,.3);}
.ft-r{font-family:var(--font-body);font-size:10px;font-weight:300;letter-spacing:.14em;color:rgba(255,255,255,.2);}

@media(max-width:900px){
  nav,nav.scrolled{padding:14px 20px;}
  .hero-content{padding:32px 20px 40px;}
  .proj-nav-row{padding:14px 20px;flex-direction:column;align-items:flex-start;gap:12px;}
  #proj-content{grid-template-columns:1fr;padding:48px 20px;gap:48px;}
  .pc-meta{position:static;}
  #other-projects{padding:60px 20px 80px;}
  footer{flex-direction:column;gap:10px;padding:20px;}
}
</style>
</head>

let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function tr(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tr);})();
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',scrollY>60));
document.querySelectorAll('a,button,.op-card').forEach(el=>{

  el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));
});

function getParam(key){return new URLSearchParams(location.search).get(key);}
let currentId=parseInt(getParam('id'))||0;

function loadProject(id){
  const p=projects.find(x=>x.id===id)||projects[0];
  document.title=`${p.title} — Tommaso Colasanti`;
  document.getElementById('proj-hero-img').src=p.img;
  document.getElementById('hc-cat').textContent=p.cat;
  document.getElementById('hc-num').textContent=p.num;
  document.getElementById('proj-title').textContent=p.title;
  document.getElementById('proj-subtitle').textContent=p.subtitle;
  document.getElementById('proj-desc-text').innerHTML=p.desc;

  // gallery
  const gal=document.getElementById('proj-gallery');
  gal.innerHTML=p.gallery.map(g=>`<img src="${g}" alt="">`).join('');

  // meta
  const metaBox=document.getElementById('proj-meta');
  metaBox.innerHTML=p.meta.map(m=>`<div class="meta-row"><label>${m.l}</label><span>${m.v}</span></div>`).join('');

  // tags
  const tagsEl=document.getElementById('proj-tags');
  tagsEl.innerHTML=p.tags.map(t=>`<span class="tag">${t}</span>`).join('');

  // other projects strip
  const strip=document.getElementById('otherStrip');
  strip.innerHTML='';
  projects.filter(x=>x.id!==id).forEach(op=>{
    const card=document.createElement('div');card.className='op-card';
    card.innerHTML=`<img src="${op.img}" alt="${op.title}">
      <div class="op-card-body"><p class="op-card-cat">${op.cat}</p><p class="op-card-title">${op.title}</p></div>`;
    card.addEventListener('click',()=>{currentId=op.id;loadProject(op.id);history.pushState(null,'',`?id=${op.id}`);window.scrollTo({top:0,behavior:'smooth'});});
    card.addEventListener('mouseenter',()=>document.body.classList.add('ch'));
    card.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));
    strip.appendChild(card);
  });

  // nav buttons
  const idx=projects.findIndex(x=>x.id===id);
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===projects.length-1;
}

function navigateProject(dir){
  const idx=projects.findIndex(x=>x.id===currentId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=projects.length)return;
  currentId=projects[newIdx].id;
  loadProject(currentId);
  history.pushState(null,'',`?id=${currentId}`);
  window.scrollTo({top:0,behavior:'smooth'});
}

loadProject(currentId);
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',scrollY>60));
</script>
</body>
</html>
